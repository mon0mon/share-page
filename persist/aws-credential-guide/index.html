<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS 인증 방식 가이드</title>
<style>
body {
  margin: 0;
  padding: 1rem;
  font-family: var(--font-sans);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  box-sizing: border-box;
}
*, *::before, *::after { box-sizing: inherit; }

:root {
  --p: #e0e0e0;
  --s: #a0a0a0;
  --t: #707070;
  --bg2: #2a2a2a;
  --b: #404040;
  --color-text-primary: #e0e0e0;
  --color-text-secondary: #a0a0a0;
  --color-text-tertiary: #707070;
  --color-text-info: #85B7EB;
  --color-text-danger: #F09595;
  --color-text-success: #97C459;
  --color-text-warning: #EF9F27;
  --color-background-primary: #1a1a1a;
  --color-background-secondary: #2a2a2a;
  --color-background-tertiary: #111111;
  --color-background-info: #0C447C;
  --color-background-danger: #791F1F;
  --color-background-success: #27500A;
  --color-background-warning: #633806;
  --color-border-primary: rgba(255,255,255,0.4);
  --color-border-secondary: rgba(255,255,255,0.3);
  --color-border-tertiary: rgba(255,255,255,0.15);
  --font-sans: system-ui, -apple-system, sans-serif;
  --font-mono: ui-monospace, monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}

button {
  background: transparent;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  color: var(--color-text-primary);
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
}
button:hover { background: var(--color-background-secondary); }
button:active { transform: scale(0.98); }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--color-border-tertiary);
  margin-bottom: 1.5rem;
}
.tab-btn {
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-secondary);
  background: transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover {
  color: var(--color-text-primary);
  background: transparent;
}
.tab-btn.active {
  color: var(--color-text-info);
  border-bottom: 2px solid var(--color-text-info);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Decision Tree */
.breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 28px;
  margin-bottom: 1.25rem;
  font-size: 12px;
  color: var(--color-text-tertiary);
}
.breadcrumb-item {
  color: var(--color-text-secondary);
}
.breadcrumb-sep {
  color: var(--color-text-tertiary);
}
.breadcrumb-current {
  color: var(--color-text-info);
  font-weight: 500;
}

.question-card {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.question-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  margin-bottom: 0.5rem;
}
.question-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: 1rem;
}
.options-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.option-btn {
  text-align: left;
  padding: 10px 14px;
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  font-size: 14px;
  transition: border-color 0.15s, background 0.15s;
}
.option-btn:hover {
  border-color: var(--color-text-info);
  background: rgba(133, 183, 235, 0.08);
}
.option-btn .opt-icon {
  font-size: 18px;
  display: block;
  margin-bottom: 4px;
}
.option-btn .opt-label {
  font-weight: 500;
  display: block;
  color: var(--color-text-primary);
}
.option-btn .opt-desc {
  font-size: 11px;
  color: var(--color-text-tertiary);
  display: block;
  margin-top: 2px;
}

/* Result card */
.result-card {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--color-background-success);
  color: var(--color-text-success);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 0.75rem;
}
.result-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 0.5rem;
}
.result-desc {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  margin-bottom: 1rem;
}
.result-why {
  background: var(--color-background-tertiary);
  border-left: 3px solid var(--color-text-info);
  border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
  padding: 0.75rem 1rem;
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 1rem;
}
.result-why strong { color: var(--color-text-info); }
.code-block {
  background: var(--color-background-tertiary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-text-secondary);
  overflow-x: auto;
  white-space: pre;
  line-height: 1.6;
}
.code-comment { color: var(--color-text-tertiary); }
.code-key { color: var(--color-text-info); }
.code-val { color: var(--color-text-success); }
.code-cmd { color: var(--color-text-warning); }

.reset-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 0.75rem;
}
.reset-btn {
  font-size: 13px;
  color: var(--color-text-secondary);
  padding: 5px 12px;
}

/* Rotation Simulator */
.scenario-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
  align-items: center;
}
.scenario-label {
  font-size: 13px;
  color: var(--color-text-tertiary);
  margin-right: 4px;
}
.scenario-btn {
  font-size: 13px;
  padding: 5px 14px;
}
.scenario-btn.active {
  background: var(--color-background-info);
  border-color: var(--color-text-info);
  color: var(--color-text-info);
}

.sim-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
@media (max-width: 560px) {
  .sim-layout { grid-template-columns: 1fr; }
}

.key-card {
  background: var(--color-background-secondary);
  border: 1.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem;
  transition: border-color 0.3s, background 0.3s;
  position: relative;
}
.key-card.state-active {
  border-color: var(--color-text-success);
  background: rgba(151, 196, 89, 0.05);
}
.key-card.state-inactive {
  border-color: var(--color-text-warning);
  background: rgba(239, 159, 39, 0.05);
}
.key-card.state-empty {
  border-color: var(--b);
  background: var(--color-background-secondary);
  opacity: 0.6;
}
.key-card.state-new {
  border-color: var(--color-text-info);
  background: rgba(133, 183, 235, 0.05);
}

.key-slot-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-tertiary);
  margin-bottom: 0.6rem;
}
.key-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 0.75rem;
}
.key-status-badge.active {
  background: var(--color-background-success);
  color: var(--color-text-success);
}
.key-status-badge.inactive {
  background: var(--color-background-warning);
  color: var(--color-text-warning);
}
.key-status-badge.empty {
  background: rgba(64,64,64,0.4);
  color: var(--color-text-tertiary);
}
.key-status-badge.new-key {
  background: var(--color-background-info);
  color: var(--color-text-info);
}

.key-id {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}
.key-meta {
  font-size: 11px;
  color: var(--color-text-tertiary);
}

.key-highlight-ring {
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--border-radius-lg) + 2px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  border: 2px solid var(--color-text-info);
}
.key-card.highlight .key-highlight-ring {
  opacity: 1;
  animation: pulse-ring 1s ease-in-out infinite alternate;
}
@keyframes pulse-ring {
  from { opacity: 0.4; }
  to { opacity: 1; }
}

.step-panel {
  background: var(--color-background-secondary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.step-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.75rem;
}
.step-number {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--color-background-info);
  color: var(--color-text-info);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.step-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
}
.step-desc {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.6;
  margin-bottom: 0.85rem;
}
.step-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 1rem;
  align-items: center;
}
.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-border-tertiary);
  transition: background 0.2s;
}
.step-dot.done { background: var(--color-text-success); }
.step-dot.current { background: var(--color-text-info); width: 20px; border-radius: 4px; }

.nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: space-between;
  margin-top: 0.5rem;
}
.nav-count {
  font-size: 13px;
  color: var(--color-text-tertiary);
}
.nav-buttons {
  display: flex;
  gap: 8px;
}

.cli-block {
  background: var(--color-background-tertiary);
  border: 1px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 0.75rem 1rem;
  font-family: var(--font-mono);
  font-size: 12px;
  overflow-x: auto;
  white-space: pre;
  color: var(--color-text-secondary);
  line-height: 1.7;
}
.cli-prompt { color: var(--color-text-success); }
.cli-cmd { color: var(--color-text-warning); }
.cli-flag { color: var(--color-text-info); }
.cli-val { color: #c9c06e; }
.cli-comment { color: var(--color-text-tertiary); font-style: italic; }

.timer-display {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--color-background-warning);
  color: var(--color-text-warning);
  border-radius: var(--border-radius-md);
  padding: 4px 10px;
  font-size: 12px;
  font-family: var(--font-mono);
  margin-top: 6px;
}

.info-box {
  background: rgba(133, 183, 235, 0.08);
  border: 1px solid rgba(133, 183, 235, 0.2);
  border-radius: var(--border-radius-md);
  padding: 0.75rem 1rem;
  font-size: 13px;
  color: var(--color-text-info);
  margin-top: 8px;
  line-height: 1.5;
}
.warn-box {
  background: rgba(239, 159, 39, 0.08);
  border: 1px solid rgba(239, 159, 39, 0.2);
  border-radius: var(--border-radius-md);
  padding: 0.75rem 1rem;
  font-size: 13px;
  color: var(--color-text-warning);
  margin-top: 8px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('tree')">환경별 인증 방식 결정 트리</button>
  <button class="tab-btn" onclick="switchTab('rotation')">키 로테이션 시뮬레이터</button>
</div>

<!-- TAB 1: Decision Tree -->
<div id="tab-tree" class="tab-panel active">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="tree-content"></div>
</div>

<!-- TAB 2: Rotation Simulator -->
<div id="tab-rotation" class="tab-panel">
  <div class="scenario-bar">
    <span class="scenario-label">시나리오:</span>
    <button class="scenario-btn active" id="btn-scenario-a" onclick="setScenario('A')">A — 정상 로테이션</button>
    <button class="scenario-btn" id="btn-scenario-b" onclick="setScenario('B')">B — 슬롯 복구</button>
  </div>
  <div class="sim-layout">
    <div class="key-card" id="slot1">
      <div class="key-highlight-ring"></div>
      <div class="key-slot-label">슬롯 1</div>
      <div class="key-status-badge" id="slot1-badge"></div>
      <div class="key-id" id="slot1-id"></div>
      <div class="key-meta" id="slot1-meta"></div>
    </div>
    <div class="key-card" id="slot2">
      <div class="key-highlight-ring"></div>
      <div class="key-slot-label">슬롯 2</div>
      <div class="key-status-badge" id="slot2-badge"></div>
      <div class="key-id" id="slot2-id"></div>
      <div class="key-meta" id="slot2-meta"></div>
    </div>
  </div>
  <div class="step-panel">
    <div class="step-progress" id="step-progress"></div>
    <div class="step-header">
      <div class="step-number" id="step-number">1</div>
      <div class="step-title" id="step-title"></div>
    </div>
    <div class="step-desc" id="step-desc"></div>
    <div id="step-extra"></div>
    <div class="cli-block" id="step-cli"></div>
    <div class="nav-row">
      <div class="nav-count" id="nav-count"></div>
      <div class="nav-buttons">
        <button onclick="prevStep()">← 이전</button>
        <button onclick="nextStep()">다음 →</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── TAB LOGIC ───────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ─── DECISION TREE ───────────────────────────────────────────────────────────
const TREE = {
  id: 'root',
  question: '어디서 실행하나요?',
  options: [
    {
      label: 'AWS 환경 내', icon: '☁️', desc: 'EC2, Lambda, ECS 등',
      next: {
        id: 'aws-service',
        question: 'AWS 서비스 종류를 선택하세요',
        options: [
          {
            label: 'EC2', icon: '🖥️', desc: '가상 서버',
            result: {
              title: 'EC2 IAM Instance Profile',
              desc: 'EC2 인스턴스에 IAM 역할을 연결하면 애플리케이션이 자동으로 임시 자격증명을 받습니다. 액세스 키를 코드에 직접 넣을 필요가 없습니다.',
              why: '<strong>이유:</strong> IMDSv2를 통해 자격증명이 자동 갱신되며, 키 유출 위험이 없습니다.',
              code: `<span class="code-comment"># 1. IAM 역할 생성 (EC2 신뢰 정책 포함)</span>
<span class="code-key">aws iam create-role</span> \\
  <span class="code-cmd">--role-name</span> MyEC2Role \\
  <span class="code-cmd">--assume-role-policy-document</span> <span class="code-val">'{
    "Version": "2012-10-17",
    "Statement": [{
      "Effect": "Allow",
      "Principal": { "Service": "ec2.amazonaws.com" },
      "Action": "sts:AssumeRole"
    }]
  }'</span>

<span class="code-comment"># 2. 권한 정책 연결</span>
<span class="code-key">aws iam attach-role-policy</span> \\
  <span class="code-cmd">--role-name</span> MyEC2Role \\
  <span class="code-cmd">--policy-arn</span> <span class="code-val">arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess</span>

<span class="code-comment"># 3. 인스턴스 프로파일 생성 및 연결</span>
<span class="code-key">aws iam create-instance-profile</span> <span class="code-cmd">--instance-profile-name</span> MyEC2Profile
<span class="code-key">aws iam add-role-to-instance-profile</span> \\
  <span class="code-cmd">--instance-profile-name</span> MyEC2Profile \\
  <span class="code-cmd">--role-name</span> MyEC2Role

<span class="code-comment"># 4. SDK는 자동으로 IMDSv2에서 자격증명 획득</span>
<span class="code-comment"># 코드에 별도 설정 불필요</span>`
            }
          },
          {
            label: 'Lambda', icon: 'λ', desc: '서버리스 함수',
            result: {
              title: 'Lambda 실행 역할 (Execution Role)',
              desc: 'Lambda 함수 생성 시 실행 역할을 지정합니다. 함수 호출마다 STS가 임시 자격증명을 자동으로 주입합니다.',
              why: '<strong>이유:</strong> 환경변수 <code>AWS_ACCESS_KEY_ID</code> 등이 런타임에 자동 세팅됩니다. 키를 직접 관리할 필요가 없습니다.',
              code: `<span class="code-comment"># 1. Lambda 실행 역할 생성</span>
<span class="code-key">aws iam create-role</span> \\
  <span class="code-cmd">--role-name</span> MyLambdaRole \\
  <span class="code-cmd">--assume-role-policy-document</span> <span class="code-val">'{
    "Version": "2012-10-17",
    "Statement": [{
      "Effect": "Allow",
      "Principal": { "Service": "lambda.amazonaws.com" },
      "Action": "sts:AssumeRole"
    }]
  }'</span>

<span class="code-comment"># 2. 기본 실행 권한 부여 (CloudWatch Logs)</span>
<span class="code-key">aws iam attach-role-policy</span> \\
  <span class="code-cmd">--role-name</span> MyLambdaRole \\
  <span class="code-cmd">--policy-arn</span> <span class="code-val">arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole</span>

<span class="code-comment"># 3. 함수 생성 시 역할 지정</span>
<span class="code-key">aws lambda create-function</span> \\
  <span class="code-cmd">--function-name</span> MyFunction \\
  <span class="code-cmd">--role</span> <span class="code-val">arn:aws:iam::123456789:role/MyLambdaRole</span> \\
  <span class="code-cmd">--runtime</span> python3.12 ...`
            }
          },
          {
            label: 'ECS', icon: '🐳', desc: '컨테이너 서비스',
            result: {
              title: 'ECS Task Role',
              desc: 'ECS 태스크 정의에 Task Role을 지정합니다. 컨테이너 내부에서 ECS 메타데이터 엔드포인트를 통해 임시 자격증명을 받습니다.',
              why: '<strong>이유:</strong> Task Role은 태스크 단위로 최소 권한 원칙을 적용할 수 있어 서비스 간 격리가 가능합니다.',
              code: `<span class="code-comment"># 1. Task Role 생성</span>
<span class="code-key">aws iam create-role</span> \\
  <span class="code-cmd">--role-name</span> MyECSTaskRole \\
  <span class="code-cmd">--assume-role-policy-document</span> <span class="code-val">'{
    "Version": "2012-10-17",
    "Statement": [{
      "Effect": "Allow",
      "Principal": { "Service": "ecs-tasks.amazonaws.com" },
      "Action": "sts:AssumeRole"
    }]
  }'</span>

<span class="code-comment"># 2. 태스크 정의에 역할 지정 (task-definition.json)</span>
<span class="code-val">{
  "taskRoleArn": "arn:aws:iam::123456789:role/MyECSTaskRole",
  "executionRoleArn": "arn:aws:iam::123456789:role/ecsTaskExecutionRole",
  "containerDefinitions": [...]

let path = [];
let currentNode = TREE;

function renderTree() {
  const content = document.getElementById('tree-content');
  const breadcrumb = document.getElementById('breadcrumb');

  // Breadcrumb
  if (path.length === 0) {
    breadcrumb.innerHTML = '';
  } else {
    let html = '';
    path.forEach((step, i) => {
      if (i > 0) html += '<span class="breadcrumb-sep">›</span>';
      if (i === path.length - 1) {
        html += `<span class="breadcrumb-current">${step}</span>`;
      } else {
        html += `<span class="breadcrumb-item">${step}</span>`;
      }
    });
    breadcrumb.innerHTML = html;
  }

  if (currentNode.result) {
    const r = currentNode.result;
    content.innerHTML = `
      <div class="result-card">
        <div class="result-badge">✓ 권장 방식</div>
        <div class="result-title">${r.title}</div>
        <div class="result-desc">${r.desc}</div>
        <div class="result-why">${r.why}</div>
        <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:6px;">설정 예시</div>
        <div class="code-block">${r.code}</div>
      </div>
      <div class="reset-row">
        <button class="reset-btn" onclick="resetTree()">↩ 처음부터 다시 시작</button>
      </div>`;
    return;
  }

  const node = currentNode.next || currentNode;
  const optHtml = node.options.map((opt, i) => `
    <button class="option-btn" onclick="choose(${i})">
      <span class="opt-icon">${opt.icon}</span>
      <span class="opt-label">${opt.label}</span>
      <span class="opt-desc">${opt.desc}</span>
    </button>`).join('');

  content.innerHTML = `
    <div class="question-card">
      <div class="question-label">질문</div>
      <div class="question-text">${node.question}</div>
      <div class="options-grid">${optHtml}</div>
    </div>
    ${path.length > 0 ? '<div class="reset-row"><button class="reset-btn" onclick="resetTree()">↩ 처음부터 다시 시작</button></div>' : ''}`;
}

function choose(idx) {
  const node = currentNode.next || currentNode;
  const chosen = node.options[idx];
  path.push(chosen.label);
  if (chosen.next) {
    currentNode = chosen;
  } else if (chosen.result) {
    currentNode = chosen;
  }
  renderTree();
}

function resetTree() {
  path = [];
  currentNode = TREE;
  renderTree();
}

let currentScenario = 'A';
let currentStep = 0;

function setScenario(s) {
  currentScenario = s;
  currentStep = 0;
  document.getElementById('btn-scenario-a').classList.toggle('active', s === 'A');
  document.getElementById('btn-scenario-b').classList.toggle('active', s === 'B');
  renderSim();
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderSim(); }
}
function nextStep() {
  const steps = SCENARIOS[currentScenario].steps;
  if (currentStep < steps.length - 1) { currentStep++; renderSim(); }
}

function renderSim() {
  const scenario = SCENARIOS[currentScenario];
  const step = scenario.steps[currentStep];
  const total = scenario.steps.length;

  // Key cards
  renderSlot('slot1', step.slot1, step.highlight === 'slot1');
  renderSlot('slot2', step.slot2, step.highlight === 'slot2');

  // Progress dots
  let dotsHtml = '';
  for (let i = 0; i < total; i++) {
    if (i < currentStep) dotsHtml += '<div class="step-dot done"></div>';
    else if (i === currentStep) dotsHtml += '<div class="step-dot current"></div>';
    else dotsHtml += '<div class="step-dot"></div>';
  }
  document.getElementById('step-progress').innerHTML = dotsHtml;

  document.getElementById('step-number').textContent = currentStep + 1;
  document.getElementById('step-title').textContent = step.title;
  document.getElementById('step-desc').textContent = step.desc;
  document.getElementById('step-cli').innerHTML = step.cli;
  document.getElementById('step-extra').innerHTML = step.extra || '';
  document.getElementById('nav-count').textContent = `${currentStep + 1} / ${total}`;
}

function renderSlot(slotId, data, highlight) {
  const card = document.getElementById(slotId);
  const badge = document.getElementById(slotId + '-badge');
  const keyId = document.getElementById(slotId + '-id');
  const meta = document.getElementById(slotId + '-meta');

  card.className = 'key-card state-' + data.state + (highlight ? ' highlight' : '');

  const stateClass = data.state === 'new-key' ? 'new-key' : data.state;
  badge.className = 'key-status-badge ' + stateClass;

  const dot = data.state === 'active' ? '●' : data.state === 'inactive' ? '◐' : data.state === 'new-key' ? '★' : '○';
  badge.innerHTML = `${dot} ${data.label}`;
  keyId.textContent = data.keyId !== '—' ? data.keyId : '';
  meta.textContent = data.meta;
}

// Init
renderTree();
renderSim();
